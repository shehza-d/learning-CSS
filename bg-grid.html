<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Copied from: https://freeapi.app/ */
        body {
            background-color: black;
            
            /* main bg grid code start */
            background-image: linear-gradient(hsla(0, 0%, 100%, .04) 1px, transparent 0), linear-gradient(90deg, hsla(0, 0%, 100%, .04) 1px, transparent 0);
            background-size: 56px 56px;
            /* main bg grid code end */
            
            /* background-position: -1px -1px; */
            mask-image: radial-gradient(ellipse at center, #000 40%, transparent 75%);
            opacity: .7;
            inset: 0;
            position: absolute;
        }

        h1 {
            color: white;
        }
    </style>
</head>

<body>
    <h1>hello</h1>
</body>

</html>
